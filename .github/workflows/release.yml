name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - name: Install required build tools for linux
        run: sudo apt-get update && sudo apt-get install clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev locate rpm patchelf libfuse2
      - name: Build linux release
        run: |
          flutter config --enable-linux-desktop
          flutter config --no-enable-android
          flutter pub get
          flutter build linux --release
      - run: zip -r linux-release.zip ./build/linux/x64/release/bundle
      - name: Release Linux Zip
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            linux-release.zip
          body_path: ./.github/doc/DownloadDescription.md
      - name: Install flutter_distributor
        run: |
          dart pub global activate flutter_distributor
      - name: Build deb package
        run: |
          flutter_distributor package --platform linux --targets deb
      - name: Build rpm package
        run: |
          flutter_distributor package --platform linux --targets rpm
      - name: Build AppImage package
        run: |
          wget -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/13/obsolete-appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/
          flutter_distributor package --platform linux --targets appimage
      - name: Release Linux deb rpm AppImage
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/**/**/*.deb
            dist/**/**/*.rpm
            dist/**/**/*.AppImage
          body_path: ./.github/doc/DownloadDescription.md
      # Snap Store: 需在 GitHub Settings → Secrets 配置 SNAPCRAFT_TOKEN 后才会发布成功
      - name: Set Snap version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ github.ref_name }}"; VERSION="${VERSION#v}"
          sed -i "s/^version: .*/version: $VERSION/" snap/snapcraft.yaml
      - name: Install Snapcraft and build snap
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          sudo apt-get install -y lxd
          sudo lxd init --auto
          sudo snap install snapcraft --classic
          snapcraft snap
        continue-on-error: true
      - name: Release Linux snap to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          SNAP=$(ls openclaw-installer_*.snap 2>/dev/null | head -1)
          if [ -n "$SNAP" ]; then
            cp "$SNAP" openclaw-installer-release.snap
          fi
        continue-on-error: true
      - name: Upload snap to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: openclaw-installer-release.snap
          body_path: ./.github/doc/DownloadDescription.md
        continue-on-error: true
      - name: Publish to Snap Store
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          SNAP=$(ls openclaw-installer_*.snap 2>/dev/null | head -1)
          if [ -z "$SNAP" ]; then SNAP=openclaw-installer-release.snap; fi
          if [ -f "$SNAP" ] && [ -n "${{ secrets.SNAPCRAFT_TOKEN }}" ]; then
            echo "${{ secrets.SNAPCRAFT_TOKEN }}" | snapcraft login --with -
            snapcraft upload "$SNAP" --release=stable
          fi
        continue-on-error: true

  macos:
    name: MacOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - run: flutter config --enable-macos-desktop
      - run: flutter config --no-enable-android
      - run: flutter pub get
      - run: flutter build macos --debug
      - run: mkdir -p build/dmg
      - run: cp -R build/macos/Build/Products/Debug/openclaw_installer.app build/dmg/openclaw_installer.app
      - run: ln -s /Applications build/dmg
      - run: ls build/dmg
      - run: hdiutil create -srcfolder build/dmg -volname "OpenClaw Installer" -format UDZO -ov -imagekey zlib-level=9 openclaw_installer.dmg
      - name: Release MacOS dmg
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./openclaw_installer.dmg
          body_path: ./.github/doc/DownloadDescription.md
      # Mac App Store / TestFlight: 需配置 Apple 证书与 APPSTORE_*，并构建 signed .pkg
      - name: Upload macOS to App Store Connect (TestFlight)
        if: startsWith(github.ref, 'refs/tags/')
        uses: apple-actions/upload-testflight-build@v2
        with:
          app-path: build/macos/Build/Products/Release/openclaw_installer.app
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        continue-on-error: true

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - run: flutter config --enable-windows-desktop
      - run: flutter config --no-enable-android
      - run: flutter pub get
      - run: flutter build windows --release
      - run: Compress-Archive -Path build\windows\x64\runner\Release -DestinationPath windows-release.zip
      - name: Release windows zip
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            windows-release.zip
          body_path: ./.github/doc/DownloadDescription.md
      - run: dart run msix:create
      - name: Release windows msix
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/windows/x64/runner/Release/*.msix
          body_path: ./.github/doc/DownloadDescription.md
      - name: Building the installer
        run: |
          "%programfiles(x86)%\Inno Setup 6\iscc.exe" "windows-setup.iss"
        shell: cmd
      - name: Release windows setup
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            Output/OpenClawInstaller-Setup.exe
          body_path: ./.github/doc/DownloadDescription.md
      # Microsoft Store: 需配置 MS_STORE_CLIENT_ID, MS_STORE_CLIENT_SECRET, MS_STORE_TENANT_ID, MS_STORE_APP_ID
      - name: Upload MSIX to Microsoft Store (Partner Center)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pwsh -File .github/scripts/upload-ms-store.ps1
        continue-on-error: true
        env:
          MS_STORE_CLIENT_ID: ${{ secrets.MS_STORE_CLIENT_ID }}
          MS_STORE_CLIENT_SECRET: ${{ secrets.MS_STORE_CLIENT_SECRET }}
          MS_STORE_TENANT_ID: ${{ secrets.MS_STORE_TENANT_ID }}
          MS_STORE_APP_ID: ${{ secrets.MS_STORE_APP_ID }}

  build-flutter-app:
    name: Build and compressed Flutter app
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Flutter dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-dev pkg-config cmake ninja-build libblkid-dev
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - name: Build Flutter linux version
        working-directory: ${{ github.workspace }}
        run: |
          ./build-flutter-app.sh
      - name: Upload app archive to workflow
        uses: actions/upload-artifact@v4
        with:
          name: OpenClawInstaller-Archive
          path: OpenClawInstaller-Linux-Portable.tar.gz
      - name: Release Linux OpenClawInstaller-Linux-Portable.tar.gz
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            OpenClawInstaller-Linux-Portable.tar.gz
          body_path: ./.github/doc/DownloadDescription.md

  build-flatpak:
    name: Build flatpak
    needs: build-flutter-app
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: OpenClawInstaller-Archive
      - name: Build .flatpak
        uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: OpenClawInstaller.flatpak
          manifest-path: flathub_repo/com.openclaw_installer.OpenClawInstaller.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false
      - name: Upload .flatpak artifact to workflow
        uses: actions/upload-artifact@v4
        with:
          name: Flatpak artifact
          path: OpenClawInstaller.flatpak
      - name: Release Linux flatpak package
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            OpenClawInstaller.flatpak
          body_path: ./.github/doc/DownloadDescription.md
